<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健促填報管理系統</title>
  <!-- 引入 Tailwind CSS 進行排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Lucide 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- 引入 Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import {
      getStorage, ref as storageRef, uploadBytes, getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

    // 這組設定值不是密碼，只是「連線指向」，真正的安全防線在 firestore.rules
    // 複製自 常用小程式/firebase-config.js，維持單檔案可獨立分享的慣例
    const firebaseConfig = {
      apiKey: "AIzaSyCBGcqHZrugpTX9eQ0hK1IMGlZps4wDPKU",
      authDomain: "my-teching-tools.firebaseapp.com",
      projectId: "my-teching-tools",
      storageBucket: "my-teching-tools.firebasestorage.app",
      messagingSenderId: "892059582991",
      appId: "1:892059582991:web:341c3fe84c4c2fe006597a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const activitiesRef = collection(db, "health_promotion_activities");
    const MAX_PHOTO_SIZE = 1 * 1024 * 1024; // 對應 storage.rules 的 1MB 上限，超過的照片由前端自動壓縮
    const MAX_PHOTO_COUNT = 4; // 對應 firestore.rules 的 photo_urls.size() <= 4

    // ---------- 照片壓縮：把手機拍的原始照片壓到 1MB 以內才上傳 ----------
    function loadImageSource(file) {
      if (window.createImageBitmap) {
        return createImageBitmap(file, { imageOrientation: 'from-image' }); // 自動修正手機拍照的方向資訊
      }
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    function canvasToJpegBlob(canvas, quality) {
      return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
    }

    async function compressImage(file, maxBytes) {
      const source = await loadImageSource(file);
      const srcWidth = source.width;
      const srcHeight = source.height;

      let maxDimension = 1600;
      let quality = 0.85;
      let blob = null;

      // 逐步縮小畫質，畫質降到底之後改縮小尺寸，最多試 8 輪
      for (let attempt = 0; attempt < 8; attempt++) {
        const scale = Math.min(1, maxDimension / Math.max(srcWidth, srcHeight));
        const width = Math.max(1, Math.round(srcWidth * scale));
        const height = Math.max(1, Math.round(srcHeight * scale));

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(source, 0, 0, width, height);

        blob = await canvasToJpegBlob(canvas, quality);
        if (blob.size <= maxBytes) return blob;

        if (quality > 0.5) {
          quality -= 0.1;
        } else {
          maxDimension = Math.round(maxDimension * 0.8);
          quality = 0.85;
        }
      }

      return blob; // 盡力壓縮後的結果，呼叫端會再檢查是否真的壓到範圍內
    }

    // 7 大議題（新竹市）與六大範疇
    const TOPICS = ['視力保健', '口腔保健', '健康體位', '菸檳防制', '安全教育與急救', '性教育', '全民健保（含正確用藥）'];
    const DOMAINS = ['學校衛生政策', '學校物質環境', '學校社會環境', '健康生活技能教學與行動', '社區關係', '健康服務'];
    const STATUSES = ['未填報', '填報中', '填報完成'];

    let unsubscribeSnapshot = null;
    let allActivities = [];
    let editingReportUrlId = null; // 目前正在編輯成果報告連結的活動 id，同時只能編輯一筆

    // ---------- DOM 參照 ----------
    const loginView = document.getElementById('loginView');
    const appView = document.getElementById('appView');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const userEmailLabel = document.getElementById('userEmailLabel');
    const topicOverview = document.getElementById('topicOverview');
    const activityTableBody = document.getElementById('activityTableBody');
    const emptyState = document.getElementById('emptyState');
    const activityForm = document.getElementById('activityForm');
    const formError = document.getElementById('formError');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const exportCsvBtn = document.getElementById('exportCsvBtn');
    const printBtn = document.getElementById('printBtn');
    const emptyStateText = document.getElementById('emptyStateText');

    // ---------- 表單下拉選單初始化 ----------
    function fillSelect(select, options) {
      select.innerHTML = options.map(o => `<option value="${o}">${o}</option>`).join('');
    }
    fillSelect(document.getElementById('categoryInput'), TOPICS);
    fillSelect(document.getElementById('domainInput'), DOMAINS);
    fillSelect(document.getElementById('statusInput'), STATUSES);
    categoryFilter.insertAdjacentHTML('beforeend', TOPICS.map(t => `<option value="${t}">${t}</option>`).join(''));

    // ---------- 搜尋 / 類別篩選 ----------
    searchInput.addEventListener('input', renderActivityTable);
    categoryFilter.addEventListener('change', renderActivityTable);

    // ---------- 匯出 CSV ----------
    function csvEscape(value) {
      const text = String(value ?? '');
      return `"${text.replace(/"/g, '""')}"`;
    }

    exportCsvBtn.addEventListener('click', () => {
      const rows = getFilteredActivities();
      const header = ['日期', '議題類別', '活動標題', '對應範疇', '填報狀態', '成果報告連結'];
      const lines = [header.map(csvEscape).join(',')];
      rows.forEach(a => {
        lines.push([a.date, a.category, a.title, a.domain, a.status, a.report_url].map(csvEscape).join(','));
      });

      const csvContent = '﻿' + lines.join('\r\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const timestamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      const a = document.createElement('a');
      a.href = url;
      a.download = `健促填報_${timestamp}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // ---------- 列印 ----------
    printBtn.addEventListener('click', () => window.print());

    // ---------- 登入 / 登出 ----------
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        loginError.textContent = '登入失敗，請確認帳號密碼是否正確。';
        loginError.classList.remove('hidden');
      }
    });

    logoutBtn.addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginView.classList.add('hidden');
        appView.classList.remove('hidden');
        userEmailLabel.textContent = user.email;
        startListening();
      } else {
        appView.classList.add('hidden');
        loginView.classList.remove('hidden');
        if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
      }
    });

    // ---------- 即時監聽活動列表 ----------
    function startListening() {
      const q = query(activitiesRef, orderBy('date', 'desc'));
      unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
        allActivities = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTopicOverview();
        renderActivityTable();
      });
    }

    function renderTopicOverview() {
      topicOverview.innerHTML = TOPICS.map(topic => {
        const count = allActivities.filter(a => a.category === topic).length;
        const isEmpty = count === 0;
        return `
          <div class="p-4 rounded-xl border ${isEmpty ? 'bg-red-50 border-red-100' : 'bg-white border-slate-100'}">
            <p class="text-sm font-medium ${isEmpty ? 'text-red-600' : 'text-slate-600'}">${topic}</p>
            <p class="text-2xl font-bold mt-1 ${isEmpty ? 'text-red-500' : 'text-blue-600'}">${count}<span class="text-sm font-normal ml-1">筆</span></p>
            ${isEmpty ? '<p class="text-xs text-red-400 mt-1">尚無紀錄</p>' : ''}
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    function getFilteredActivities() {
      const keyword = searchInput.value.trim().toLowerCase();
      const category = categoryFilter.value;
      return allActivities.filter(a => {
        const matchesKeyword = !keyword || (a.title || '').toLowerCase().includes(keyword);
        const matchesCategory = !category || a.category === category;
        return matchesKeyword && matchesCategory;
      });
    }

    function renderActivityTable() {
      const filtered = getFilteredActivities();

      if (filtered.length === 0) {
        emptyState.classList.remove('hidden');
        emptyStateText.textContent = allActivities.length === 0 ? '尚無活動紀錄' : '查無符合的活動';
        activityTableBody.innerHTML = '';
        return;
      }
      emptyState.classList.add('hidden');

      const statusColor = {
        '未填報': 'bg-red-50 text-red-600 border-red-100',
        '填報中': 'bg-amber-50 text-amber-600 border-amber-100',
        '填報完成': 'bg-emerald-50 text-emerald-600 border-emerald-100'
      };

      activityTableBody.innerHTML = filtered.map(a => `
        <tr class="hover:bg-blue-50/50 transition-colors bg-white">
          <td class="py-3 px-4 text-slate-600 whitespace-nowrap">${a.date || ''}</td>
          <td class="py-3 px-4 print:hidden">
            ${(a.photo_urls && a.photo_urls.length)
              ? `<div class="grid grid-cols-2 gap-1 w-[62px]">${a.photo_urls.map(url => `<a href="${url}" target="_blank" rel="noopener"><img src="${url}" alt="活動照片縮圖" class="w-7 h-7 object-cover rounded border border-slate-200 hover:opacity-80 transition-opacity"></a>`).join('')}</div>`
              : '<span class="text-slate-300 text-xs">無</span>'}
          </td>
          <td class="py-3 px-4 whitespace-nowrap"><span class="bg-indigo-50 text-indigo-700 px-2 py-1 rounded border border-indigo-100 text-xs font-medium">${a.category || ''}</span></td>
          <td class="py-3 px-4 font-medium text-slate-800 whitespace-nowrap">${a.title || ''}</td>
          <td class="py-3 px-4 text-slate-500 text-xs">${a.domain || ''}</td>
          <td class="py-3 px-4 whitespace-nowrap">
            ${editingReportUrlId === a.id ? `
              <div class="flex items-center gap-1.5 print:hidden">
                <input type="url" class="reportUrlInput text-xs px-2 py-1 border border-slate-200 rounded-lg w-40 focus:outline-none focus:ring-2 focus:ring-blue-500" data-id="${a.id}" value="${a.report_url || ''}" placeholder="https://drive.google.com/...">
                <button data-id="${a.id}" class="saveReportUrlBtn text-emerald-600 hover:text-emerald-700"><i data-lucide="check" class="w-4 h-4"></i></button>
                <button data-id="${a.id}" class="cancelReportUrlBtn text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
              </div>
            ` : `
              <div class="flex items-center gap-1.5">
                ${a.report_url ? `<a href="${a.report_url}" target="_blank" rel="noopener" class="text-blue-600 hover:underline text-sm inline-flex items-center gap-1"><i data-lucide="external-link" class="w-3.5 h-3.5"></i>報告連結</a>` : '<span class="text-slate-300 text-sm">無</span>'}
                <button data-id="${a.id}" class="editReportUrlBtn print:hidden text-slate-300 hover:text-blue-500 transition-colors" title="編輯成果報告連結">
                  <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
                </button>
              </div>
            `}
          </td>
          <td class="py-3 px-4">
            <select data-id="${a.id}" class="statusSelect print:hidden px-2 py-1 rounded-full border text-xs font-medium cursor-pointer ${statusColor[a.status] || ''}">
              ${STATUSES.map(s => `<option value="${s}" ${s === a.status ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
            <span class="hidden print:inline text-xs font-medium">${a.status || ''}</span>
          </td>
          <td class="py-3 px-4 text-right print:hidden">
            <button data-id="${a.id}" class="deleteBtn text-slate-400 hover:text-red-500 transition-colors">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </td>
        </tr>
      `).join('');

      lucide.createIcons();

      document.querySelectorAll('.statusSelect').forEach(sel => {
        sel.addEventListener('change', async () => {
          await updateDoc(doc(db, 'health_promotion_activities', sel.dataset.id), { status: sel.value });
        });
      });

      document.querySelectorAll('.deleteBtn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (confirm('確定要刪除這筆活動紀錄嗎？')) {
            await deleteDoc(doc(db, 'health_promotion_activities', btn.dataset.id));
          }
        });
      });

      // ---------- 編輯成果報告連結 ----------
      document.querySelectorAll('.editReportUrlBtn').forEach(btn => {
        btn.addEventListener('click', () => {
          editingReportUrlId = btn.dataset.id;
          renderActivityTable();
          document.querySelector(`.reportUrlInput[data-id="${btn.dataset.id}"]`)?.focus();
        });
      });

      document.querySelectorAll('.cancelReportUrlBtn').forEach(btn => {
        btn.addEventListener('click', () => {
          editingReportUrlId = null;
          renderActivityTable();
        });
      });

      async function saveReportUrl(id) {
        const input = document.querySelector(`.reportUrlInput[data-id="${id}"]`);
        try {
          await updateDoc(doc(db, 'health_promotion_activities', id), { report_url: input.value.trim() });
          editingReportUrlId = null;
        } catch (err) {
          alert('更新失敗：' + err.message);
        }
      }

      document.querySelectorAll('.saveReportUrlBtn').forEach(btn => {
        btn.addEventListener('click', () => saveReportUrl(btn.dataset.id));
      });

      document.querySelectorAll('.reportUrlInput').forEach(input => {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') saveReportUrl(input.dataset.id);
          if (e.key === 'Escape') { editingReportUrlId = null; renderActivityTable(); }
        });
      });
    }

    // ---------- 新增活動 ----------
    const submitBtn = activityForm.querySelector('button[type="submit"]');

    activityForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      formError.classList.add('hidden');

      const photoFiles = Array.from(document.getElementById('photoInput').files);

      if (photoFiles.length > MAX_PHOTO_COUNT) {
        formError.textContent = `照片最多選 ${MAX_PHOTO_COUNT} 張，請重新選擇。`;
        formError.classList.remove('hidden');
        return;
      }
      if (photoFiles.some(f => !f.type.startsWith('image/'))) {
        formError.textContent = '照片檔案格式不符，請選擇圖片檔（jpg/png 等）。';
        formError.classList.remove('hidden');
        return;
      }

      const data = {
        date: document.getElementById('dateInput').value,
        category: document.getElementById('categoryInput').value,
        title: document.getElementById('titleInput').value.trim(),
        report_url: document.getElementById('reportUrlInput').value.trim(),
        domain: document.getElementById('domainInput').value,
        status: document.getElementById('statusInput').value,
        photo_urls: [],
        created_at: serverTimestamp()
      };

      if (!data.date || !data.title) {
        formError.textContent = '請填寫日期與標題。';
        formError.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '新增中...';

      try {
        const timestamp = Date.now();
        for (let i = 0; i < photoFiles.length; i++) {
          const file = photoFiles[i];

          submitBtn.textContent = `照片壓縮中 (${i + 1}/${photoFiles.length})...`;
          const compressed = await compressImage(file, MAX_PHOTO_SIZE);
          if (compressed.size > MAX_PHOTO_SIZE) {
            throw new Error(`第 ${i + 1} 張照片壓縮後仍超過 1MB，請換一張畫面較簡單或解析度較低的照片再試一次。`);
          }

          submitBtn.textContent = `照片上傳中 (${i + 1}/${photoFiles.length})...`;
          const baseName = file.name.replace(/\.[^.]+$/, '') || 'photo';
          const fileRef = storageRef(storage, `activity_photos/${timestamp}_${i}_${baseName}.jpg`);
          await uploadBytes(fileRef, compressed, { contentType: 'image/jpeg' });
          data.photo_urls.push(await getDownloadURL(fileRef));
        }

        await addDoc(activitiesRef, data);
        activityForm.reset();
        fillSelect(document.getElementById('categoryInput'), TOPICS);
        fillSelect(document.getElementById('domainInput'), DOMAINS);
        fillSelect(document.getElementById('statusInput'), STATUSES);
      } catch (err) {
        formError.textContent = '新增失敗：' + err.message;
        formError.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '新增';
      }
    });

    lucide.createIcons();
  </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

  <!-- 登入畫面 -->
  <div id="loginView" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 w-full max-w-sm">
      <div class="flex items-center gap-3 mb-6">
        <div class="bg-blue-600 p-3 rounded-xl text-white shadow-lg shadow-blue-200">
          <i data-lucide="shield-check" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-slate-900">健促填報管理系統</h1>
          <p class="text-slate-400 text-xs mt-0.5">請先登入</p>
        </div>
      </div>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">Email</label>
          <input type="email" id="emailInput" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">密碼</label>
          <input type="password" id="passwordInput" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
        </div>
        <div id="loginError" class="hidden p-3 bg-red-50 text-red-600 text-sm rounded-lg"></div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-medium transition-colors">登入</button>
      </form>
    </div>
  </div>

  <!-- 主畫面 -->
  <div id="appView" class="hidden p-4 md:p-8 print:p-0 max-w-7xl mx-auto space-y-6">

    <!-- 頁首 -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="bg-blue-600 p-3 rounded-xl text-white shadow-lg shadow-blue-200">
          <i data-lucide="clipboard-list" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-2xl md:text-3xl font-bold text-slate-900">健促填報管理系統</h1>
          <p class="text-slate-500 text-sm mt-1">新竹市健康促進 7 大議題 × 六大範疇填報紀錄</p>
        </div>
      </div>
      <div class="flex items-center gap-3 text-sm print:hidden">
        <span id="userEmailLabel" class="text-slate-400"></span>
        <button id="logoutBtn" class="flex items-center gap-1 text-slate-500 hover:text-red-500 transition-colors">
          <i data-lucide="log-out" class="w-4 h-4"></i>登出
        </button>
      </div>
    </div>

    <!-- 議題覆蓋總覽 -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 print:hidden">
      <div class="flex items-center gap-2 mb-4 text-slate-800 font-semibold">
        <i data-lucide="layout-grid" class="w-5 h-5 text-blue-600"></i>
        <h2>議題覆蓋總覽</h2>
      </div>
      <div id="topicOverview" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 print:block">

      <!-- 新增活動表單 -->
      <div class="xl:col-span-1 print:hidden">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <div class="flex items-center gap-2 mb-4 text-slate-800 font-semibold">
            <i data-lucide="plus-circle" class="w-5 h-5 text-emerald-600"></i>
            <h2>新增活動</h2>
          </div>
          <form id="activityForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">日期</label>
              <input type="date" id="dateInput" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">議題類別</label>
              <select id="categoryInput" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all"></select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">活動標題</label>
              <input type="text" id="titleInput" required maxlength="100" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">成果報告連結（Google Drive）</label>
              <input type="url" id="reportUrlInput" placeholder="https://drive.google.com/..." class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">活動照片（選填，最多 4 張，每張自動壓縮至 1MB 以內）</label>
              <input type="file" id="photoInput" accept="image/*" multiple class="w-full text-sm text-slate-600 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-700 file:text-sm file:font-medium hover:file:bg-blue-100">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">對應範疇</label>
              <select id="domainInput" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all"></select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">填報狀態</label>
              <select id="statusInput" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all"></select>
            </div>
            <div id="formError" class="hidden p-3 bg-red-50 text-red-600 text-sm rounded-lg"></div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-medium transition-colors">新增</button>
          </form>
        </div>
      </div>

      <!-- 活動列表 -->
      <div class="xl:col-span-2 print:col-span-1">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden print:shadow-none print:border-none">
          <div class="p-4 md:p-6 border-b border-slate-100 flex items-center justify-between gap-4 flex-wrap print:border-none">
            <h2 class="text-lg font-bold text-slate-800">活動列表</h2>
            <div class="flex items-center gap-3 w-full sm:w-auto flex-wrap print:hidden">
              <select id="categoryFilter" class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                <option value="">全部議題</option>
              </select>
              <div class="relative w-full sm:w-64">
                <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                <input type="text" id="searchInput" placeholder="搜尋活動標題..." class="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
              </div>
              <button id="exportCsvBtn" class="flex items-center gap-1.5 px-3 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-100 rounded-lg text-sm font-medium transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i>匯出 CSV
              </button>
              <button id="printBtn" class="flex items-center gap-1.5 px-3 py-2 bg-slate-50 hover:bg-slate-100 text-slate-600 border border-slate-200 rounded-lg text-sm font-medium transition-colors">
                <i data-lucide="printer" class="w-4 h-4"></i>列印
              </button>
            </div>
          </div>
          <div class="overflow-x-auto relative min-h-[300px] print:overflow-visible">
            <div id="emptyState" class="hidden absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-12">
              <i data-lucide="inbox" class="w-12 h-12 mb-4 opacity-20"></i>
              <p id="emptyStateText">尚無活動紀錄</p>
            </div>
            <table class="w-full text-left border-collapse min-w-[700px] print:min-w-0">
              <thead class="sticky top-0 z-10 bg-slate-100/90 backdrop-blur-sm print:static">
                <tr class="text-slate-600 text-sm">
                  <th class="py-3 px-4 font-semibold whitespace-nowrap">日期</th>
                  <th class="py-3 px-4 font-semibold whitespace-nowrap print:hidden">照片</th>
                  <th class="py-3 px-4 font-semibold whitespace-nowrap">議題</th>
                  <th class="py-3 px-4 font-semibold whitespace-nowrap">標題</th>
                  <th class="py-3 px-4 font-semibold whitespace-nowrap">對應範疇</th>
                  <th class="py-3 px-4 font-semibold whitespace-nowrap">成果報告</th>
                  <th class="py-3 px-4 font-semibold whitespace-nowrap">填報狀態</th>
                  <th class="py-3 px-4 print:hidden"></th>
                </tr>
              </thead>
              <tbody id="activityTableBody" class="divide-y divide-slate-100 text-sm"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
